name: DevSecOps AI Pipeline

on:
  push:
    branches:
      - master

jobs:
  security-gate:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2. Start Docker services
      - name: Start containers
        run: docker compose up -d --build

      # 3. Wait for API to start
      - name: Wait for API
        run: sleep 20

      # 4. Run AI + OPA deployment check
      - name: Security check
        run: |
          curl -X POST http://127.0.0.1:8000/check-deployment \
          -H "Content-Type: application/json" \
          -d '{
            "environment":"prod",
            "public_exposure":1,
            "privilege_level":2,
            "encryption_disabled":1,
            "port_risk":2,
            "history_incidents":4,
            "mitre_tactic_score":4
          }' > result.json

      # 5. Print decision
      - name: Show decision
        run: cat result.json

      # 6. Block deployment if risk is high
      - name: Validate decision
        run: |
          if grep -q "BLOCK" result.json; then
            echo "Deployment blocked by security gate"
            exit 1
          fi

      # 7. Deployment stage
      - name: Deploy
        run: echo "Deployment allowed"
