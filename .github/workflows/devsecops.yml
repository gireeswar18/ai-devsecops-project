name: DevSecOps AI Pipeline

on:
  push:
    branches:
      - master

jobs:
  security-gate:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2. Start Docker services
      - name: Start containers
        run: docker compose up -d --build

      # 3. Wait for API to be ready
      - name: Wait for API
        run: |
          for i in {1..30}; do
            curl -sf http://127.0.0.1:8000/docs && echo "API is up!" && break
            echo "Waiting for API... attempt $i"
            sleep 5
          done

      # 3b. Show container logs (always, for debugging)
      - name: Show container logs
        if: always()
        run: docker compose logs

      # 4. Run AI + OPA deployment check
      - name: Security check
        run: |
          curl -s -X POST http://127.0.0.1:8000/deploy/check \
          -H "Content-Type: application/json" \
          -d '{
            "environment":"dev",
            "public_exposure":0,
            "privilege_level":0,
            "encryption_disabled":0,
            "port_risk":1,
            "history_incidents":0,
            "mitre_tactic_score":2
          }' > result.json

      # 5. Print decision
      - name: Show decision
        run: cat result.json

      # 6. Block deployment if risk is high
      - name: Validate decision
        run: |
          if grep -q "BLOCK" result.json; then
            echo "Deployment blocked by security gate"
            exit 1
          fi

      # 7. Deployment stage
      - name: Deploy
        run: echo "Deployment allowed"
